  <g fill="#ffffff" opacity="0.42">
    <circle cx="180" cy="130" r="4"/>
    <circle cx="280" cy="170" r="3.5"/>
    <circle cx="1120" cy="130" r="3.5"/>
    <circle cx="1550" cy="110" r="4"/>
