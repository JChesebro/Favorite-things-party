    <use href="#snowflake" x="1620" y="860" width="240" height="240"/>
    <use href="#snowflake" x="40" y="850" width="260" height="260"/>
    <use href="#snowflake" x="760" y="1000" width="160" height="160"/>
  </g>

  <g fill="url(#bubble)" opacity="0.55">
    <circle cx="1550" cy="220" r="44"/>
    <circle cx="1670" cy="320" r="30"/>
    <circle cx="1760" cy="420" r="22"/>
    <circle cx="1620" cy="490" r="34"/>
    <circle cx="1480" cy="580" r="26"/>
    <circle cx="1735" cy="630" r="18"/>
    <circle cx="1420" cy="720" r="20"/>
