<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" role="img" aria-label="Icy champagne background">
  <defs>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f4f9ff"/>
      <stop offset="0.45" stop-color="#dbe9fa"/>
      <stop offset="1" stop-color="#f1e3c9"/>
    </linearGradient>
    <radialGradient id="iceGlow" cx="18%" cy="14%" r="44%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="champagneGlow" cx="84%" cy="18%" r="38%">
      <stop offset="0" stop-color="#ffe4b3" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffe4b3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frost" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#b7d2f4" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#e7f2ff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#b7d2f4" stop-opacity="0.45"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1200" fill="url(#base)"/>
  <rect width="1920" height="1200" fill="url(#iceGlow)"/>
  <rect width="1920" height="1200" fill="url(#champagneGlow)"/>

  <g opacity="0.5">
    <path d="M0 205h1920" stroke="url(#frost)" stroke-width="3"/>
    <path d="M0 290h1920" stroke="url(#frost)" stroke-width="2"/>
    <path d="M0 980h1920" stroke="url(#frost)" stroke-width="2.5"/>
  </g>

  <g fill="#ffffff" opacity="0.42">
    <circle cx="180" cy="120" r="4"/>
    <circle cx="280" cy="170" r="3"/>
    <circle cx="1120" cy="130" r="3.5"/>
    <circle cx="1550" cy="100" r="4"/>
    <circle cx="1700" cy="160" r="3"/>
    <circle cx="480" cy="1040" r="3.5"/>
    <circle cx="990" cy="1080" r="4"/>
    <circle cx="1340" cy="1020" r="3"/>
  </g>
</svg>
