<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1200" role="img" aria-label="Icy champagne background">
  <defs>
    <linearGradient id="base" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#edf7ff"/>
      <stop offset="0.48" stop-color="#d4e6fb"/>
      <stop offset="1" stop-color="#f1dfbf"/>
    </linearGradient>
    <radialGradient id="iceMist" cx="14%" cy="16%" r="54%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="champagneMist" cx="84%" cy="16%" r="48%">
      <stop offset="0" stop-color="#ffe1aa" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#ffe1aa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iceStroke" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#b8d9ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="bubble" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff2d3" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#f2c976" stop-opacity="0.25"/>
    </radialGradient>
    <symbol id="snowflake" viewBox="-70 -70 140 140">
      <g stroke="url(#iceStroke)" stroke-width="6" stroke-linecap="round" fill="none">
        <path d="M0-62V62"/>
        <path d="M-53-31L53 31"/>
        <path d="M-53 31L53-31"/>
      </g>
      <g stroke="#d9ecff" stroke-width="4" stroke-linecap="round" opacity="0.76" fill="none">
        <path d="M0-62l12 14M0-62l-12 14"/>
        <path d="M0 62l12-14M0 62l-12-14"/>
        <path d="M53 31l-17 2M53 31l-6-16"/>
        <path d="M-53-31l17-2M-53-31l6 16"/>
        <path d="M53-31l-17-2M53-31l-6 16"/>
        <path d="M-53 31l17 2M-53 31l6-16"/>
      </g>
    </symbol>
  </defs>

  <rect width="1920" height="1200" fill="url(#base)"/>
  <rect width="1920" height="1200" fill="url(#iceMist)"/>
  <rect width="1920" height="1200" fill="url(#champagneMist)"/>

  <g opacity="0.38" stroke="#c8dff8" stroke-width="2">
    <path d="M0 210h1920"/>
    <path d="M0 280h1920"/>
    <path d="M0 960h1920"/>
